kind = "web"
previewPath = "/"
title = "Swans ShuttleHub"
version = "1.0.0"
id = "artifacts/shuttlehub"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20947

[services.development]
run = "pnpm --filter @workspace/shuttlehub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shuttlehub", "run", "build" ]
serve = "static"
publicDir = "artifacts/shuttlehub/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20947"
BASE_PATH = "/"
