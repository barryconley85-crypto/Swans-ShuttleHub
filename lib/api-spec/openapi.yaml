        username:
          type: ["string", "null"]
        action:
          type: string
        tableName:
          type: ["string", "null"]
        recordId:
          type: ["integer", "null"]
        oldValue:
          type: ["string", "null"]
        newValue:
          type: ["string", "null"]
        ipAddress:
          type: ["string", "null"]
        createdAt:
          type: string

    AuditLogPage:
      type: object
